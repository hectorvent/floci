name: Release

# Triggered when a version tag (e.g. 1.2.3) is pushed.
# Builds native (amd64 + arm64) and JVM Docker images and pushes them to Docker Hub.
#
# Published tags:
#   Native:  hectorvent/floci:1.2.3   hectorvent/floci:latest
#   JVM:     hectorvent/floci:1.2.3-jvm   hectorvent/floci:latest-jvm
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

# Per-tag concurrency. Back-to-back tag pushes (e.g. 1.5.3 and 1.6.0 landing
# minutes apart) resolve to different ${{ github.ref }} values, so they run
# in parallel rather than cancelling each other. Re-runs of the same tag
# supersede in-flight builds of that tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build JVM artifact ────────────────────────────────────────────────────
  build-jvm:
    name: Build JVM artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: actions/upload-artifact@v7
        with:
          name: jvm-artifact
          path: target/quarkus-app/
          retention-days: 1

  # ── Build native artifact — amd64 ────────────────────────────────────────
  build-native-amd64:
    name: Build native artifact (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          java-version: '24'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: mvn clean package -Dnative -DskipTests -B -Dquarkus.native.additional-build-args-append="-march=x86-64-v2"

      - uses: actions/upload-artifact@v7
        with:
          name: native-amd64
          path: |
            target/*-runner
            target/*.properties
            target/*.so
          if-no-files-found: warn
          retention-days: 1

  # ── Build native artifact — arm64 ────────────────────────────────────────
  build-native-arm64:
    name: Build native artifact (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          java-version: '24'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: mvn clean package -Dnative -DskipTests -B

      - uses: actions/upload-artifact@v7
        with:
          name: native-arm64
          path: |
            target/*-runner
            target/*.properties
            target/*.so
          if-no-files-found: warn
          retention-days: 1

  # ── Push JVM Docker image ─────────────────────────────────────────────────
  push-jvm:
    name: Push JVM Docker image
    needs: build-jvm
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          name: jvm-artifact
          path: target/quarkus-app/

      - name: Build and push JVM image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.jvm-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            floci/floci:${{ steps.version.outputs.version }}-jvm
            floci/floci:latest-jvm
            floci/floci:${{ steps.version.outputs.version }}-aws
            floci/floci:latest-aws
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            INSTALL_AWS_CLI=true

  # ── Push native Docker images (multi-arch manifest) ───────────────────────
  push-native:
    name: Push native Docker images
    needs: [build-native-amd64, build-native-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          name: native-amd64
          path: native/amd64/

      - uses: actions/download-artifact@v8
        with:
          name: native-arm64
          path: native/arm64/

      - name: Make binaries executable
        run: chmod +x native/amd64/*-runner native/arm64/*-runner

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push native multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.native-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            floci/floci:${{ steps.version.outputs.version }}
            floci/floci:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max