name: Semantic Release

# Runs semantic-release when a maintainer pushes to a release/x.y branch.
# semantic-release analyses commits since the last tag, bumps the version,
# updates CHANGELOG.md + pom.xml, commits them, and pushes a vX.Y.Z tag.
# That tag push then triggers the release.yml Docker publish workflow.
#
# Required secrets: GH_TOKEN (PAT with contents: write)

on:
  push:
    branches:
      - 'main'
      - 'release/[0-9]+.x'
      - 'release/[0-9]+.[0-9]+.x'
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - 'Dockerfile'
      - 'Dockerfile.jvm-package'
      - 'Dockerfile.native'
      - 'Dockerfile.native-package'
      - 'docker-compose.yml'
      - 'docker-compose-test.yml'
      - '.releaserc.json'
      - '.github/workflows/semver.yml'

permissions:
  contents: write

# Static group so racing version bumps serialize. If two commits land on
# main in quick succession, the second run cancels the first rather than
# both racing to tag and push back to main.
concurrency:
  group: semver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
